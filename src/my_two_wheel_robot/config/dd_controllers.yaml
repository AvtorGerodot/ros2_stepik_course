controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]
    wheel_separation: 0.26        # расстояние между колёсами, м
    wheel_radius: 0.0325            # радиус колеса, м
    odom_frame_id: odom
    base_frame_id: base_link
    enable_odom_tf: true
    publish_odom: true
    cmd_vel_timeout: 0.5
    publish_rate: 50.0
    position_feedback: true       # используем position + velocity фидбек
